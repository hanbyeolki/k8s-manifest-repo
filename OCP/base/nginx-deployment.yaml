apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-flask-proxy
  namespace: team3
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-flask-proxy
  template:
    metadata:
      labels:
        app: nginx-flask-proxy
    spec:
      containers:
      - name: nginx-flask-proxy
        image: 447079561480.dkr.ecr.ap-northeast-2.amazonaws.com/3team-nginx
        imagePullPolicy: Always
        ports:
        - containerPort: 80